spring:
  datasource:
    url: jdbc:h2:mem:sportaihub-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false

  sql:
    init:
      mode: never

management:
  endpoints:
    enabled-by-default: false